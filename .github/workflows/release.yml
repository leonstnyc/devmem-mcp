name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish artifacts after all gates pass
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  id-token: write

jobs:
  preview:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Verify
        run: |
          ruff check .
          basedpyright
          pytest
      - name: Optional API tests
        run: |
          python -m pip install -e ".[api]"
          python -m pytest tests/test_api_server.py -q
      - name: Build
        run: python -m build --sdist --wheel
      - name: Audit
        run: python scripts/audit_release.py --dist dist
      - name: Publish
        if: ${{ inputs.publish == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
